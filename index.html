<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante DON-BONI - Platos Típicos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Restaurante DON-BONI</h1>
        <p>Los mejores platos típicos del norte con entrega local</p>
    </header>

    <main>
        <!-- Sección del Menú -->
        <section id="menu">
            <h2>Nuestro Menú</h2>
            
            <!-- Plato 1 -->
            <div class="platillo" id="platillo-cabrito">
                <h3>Seco de Cabrito</h3>
                <p>Delicioso cabrito tierno acompañado de frijoles y arroz.</p>
                <span>S/. 35.00</span>
                
                <!-- Selector de Unidades en el Menú -->
                <div class="control-unidades">
                    <button type="button" onclick="cambiarUnidadesMenu('cabrito', -1)">-</button>
                    <span id="cant-cabrito">1</span>
                    <button type="button" onclick="cambiarUnidadesMenu('cabrito', 1)">+</button>
                </div>
                <button class="btn-agregar" onclick="agregarAlCarritoConCantidad('Seco de Cabrito', 35.00, 'cabrito')">Agregar al Carrito</button>
            </div>

            <!-- Plato 2 -->
            <div class="platillo" id="platillo-ceviche">
                <h3>Ceviche Norteño</h3>
                <p>Pescado fresco con su toque de ají limo y zarandaja.</p>
                <span>S/. 30.00</span>
                
                <!-- Selector de Unidades en el Menú -->
                <div class="control-unidades">
                    <button type="button" onclick="cambiarUnidadesMenu('ceviche', -1)">-</button>
                    <span id="cant-ceviche">1</span>
                    <button type="button" onclick="cambiarUnidadesMenu('ceviche', 1)">+</button>
                </div>
                <button class="btn-agregar" onclick="agregarAlCarritoConCantidad('Ceviche Norteño', 30.00, 'ceviche')">Agregar al Carrito</button>
            </div>
        </section>

        <!-- Sección del Carrito -->
        <section id="carrito-seccion">
            <h2>Tu Pedido</h2>
            <ul id="lista-carrito">
                <!-- Los platillos agregados aparecerán aquí con opción de quitar -->
            </ul>
            <p><strong>Total: S/. <span id="total-precio">0.00</span></strong></p>
            
            <form id="formulario-pago" style="display:none;">
                <button id="boton-pagar" type="submit">Confirmar y Pagar</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
